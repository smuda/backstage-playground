services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    volumes:
      - backstage_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage -d backstage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backstage:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7007:7007"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      NODE_ENV: production
    volumes:
      - ./examples:/app/examples
      - ./app-config.yaml:/app/app-config.yaml
      - ./app-config.production.yaml:/app/app-config.production.yaml

volumes:
  backstage_db:
